# Template configuration for MIS271 - Business Intelligence and Data Warehousing
# Copy and modify this for each week/session

# Lecture information
lecture:
  # URL is not used for manual downloads, but required by config schema
  url: "https://deakin.au.panopto.com/Panopto/Pages/Viewer.aspx?id=..."
  
  # Slide path - update for each week
  slide_path: "slides/MIS271_week_01.pdf"

# File paths
paths:
  # Not used for manual downloads
  cookie_file: "cookies/panopto.json"
  
  # Auto-generated by process_lecture.py - do not modify
  output_dir: "downloads/MIS271_week_01_lecture"

# Metadata
metadata:
  course_name: "MIS271 - Business Intelligence And Data Warehousing"
  week_number: 1
  lecturer_name: ""
  timestamp: ""

# Obsidian integration
obsidian_vault_path: "C:\\Users\\josha\\OneDrive\\Documents\\Obsidian Vault\\University notes\\Trimester_1_26"
obsidian_note_subfolder: "Lectures"

# LLM Configuration
openrouter_api_key: "OPENROUTER_API_KEY"
llm_model: "deepseek/deepseek-chat"
llm_budget_aud: 0.30
llm_safety_buffer: 0.20

# PII removal
remove_pii_from_transcript: true

# Google Drive (optional)
gdrive_sync_enabled: false
gdrive_sync_folder: ""
